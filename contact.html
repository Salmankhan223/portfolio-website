<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
        background-color: #f4f7f6;
    }


    /* --- Layout --- */
    .contact-section {
        width: 100%;
        padding: 40px 0px;
        opacity: 0;
        animation: fadeIn 1.2s ease-in-out forwards;
    }

    .contact-container {
        max-width: 1200px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        display: flex;
        overflow: hidden;
        /* Important for border-radius */
    }

    .contact-info,
    .contact-form {
        padding: 40px;
        flex: 1;
        /* Both divs take equal space */
    }

    /* --- Left Side: Info Styling --- */
    .contact-info {
        background-color: #1a2a40;
        /* A nice dark blue */
        color: #ffffff;
    }

    .contact-info h2 {
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 15px;
    }

    .contact-info .sub-heading {
        font-weight: 300;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .info-item {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    .info-item span {
        font-size: 1.5rem;
        margin-right: 15px;
    }

    /* --- Right Side: Form Styling --- */
    .contact-form {
        background-color: #ffffff;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 400;
        color: #555;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Poppins', sans-serif;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #007bff;
        /* Accent color on focus */
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
    }

    .submit-btn {
        width: 100%;
        padding: 15px;
        background-color: #007bff;
        /* Accent color */
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .submit-btn:hover {
        background-color: #0056b3;
        /* Darker shade on hover */
        transform: translateY(-2px);
        /* Slight lift effect */
    }

    /* --- Responsive for smaller screens --- */
    @media (max-width: 768px) {
        .contact-container {
            flex-direction: column;
            max-width: 500px;
            margin: 0 10px;
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<body>
    <header>
        <nav>
               <div id="hamburger">
                <img style="filter: invert(1);" src="hamburger.svg" alt="">
            </div>
            <div class="left">Salman portfolio</div>
            <div class="right">
                <ul>
                       <div class="close">
                        <img style="filter: invert(1);" src="close.svg" alt="">
                    </div>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact Me</a></li>
                </ul>
            </div>
            
        </nav>
    </header>

    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-info">
                <h2>Let's Get in Touch!</h2>

                    on social media.</p>

                    <span>📍</span>
                    <p>Jhansi, Uttar Pradesh</p>
                </div>
                <div class="info-item">

                    <a style="color: #ffffff;" href="https://wa.me/+917309735175?text=Hi">Contact me on Whatsapp</a>
                </div>

            </div>

            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>
